name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "definitions/**"
      - "terraform/*.tf"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.7"

      - name: Build Lambda package
        run: ./build.sh

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.STATE_BUCKET_NAME }}" \
            -backend-config="key=jira-integrations/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'us-east-1' }}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_jira_base_url: ${{ secrets.JIRA_BASE_URL }}
          TF_VAR_jira_user_email: ${{ secrets.JIRA_USER_EMAIL }}
          TF_VAR_jira_api_token: ${{ secrets.JIRA_API_TOKEN }}
          TF_VAR_webhook_secret: ${{ secrets.WEBHOOK_SECRET }}
        run: terraform apply -auto-approve
